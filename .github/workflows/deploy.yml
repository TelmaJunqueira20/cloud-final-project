name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 442940292574.dkr.ecr.eu-west-1.amazonaws.com
  ECR_REPOSITORY: cloud-final-project
  EC2_HOST: 108.131.130.201

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::442940292574:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:user-service

      - name: Build and push product-service
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:product-service

      - name: Build and push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:order-service

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:api-gateway

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::442940292574:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
           --instance-ids i-0c6e8773ca65c10e0 \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin 442940292574.dkr.ecr.eu-west-1.amazonaws.com",
              "docker pull 442940292574.dkr.ecr.eu-west-1.amazonaws.com/cloud-final-project:user-service",
              "docker pull 442940292574.dkr.ecr.eu-west-1.amazonaws.com/cloud-final-project:product-service",
              "docker pull 442940292574.dkr.ecr.eu-west-1.amazonaws.com/cloud-final-project:order-service",
              "docker pull 442940292574.dkr.ecr.eu-west-1.amazonaws.com/cloud-final-project:api-gateway",
              "docker rm -f user-service product-service order-service api-gateway 2>/dev/null || true",
              "docker network create microservices-network 2>/dev/null || true",
              "docker run -d --name user-service --network microservices-network -p 8081:8081 -e SPRING_PROFILES_ACTIVE=docker -e DB_HOST=cloud-final-project-db.ctci8kww4g6j.eu-west-1.rds.amazonaws.com -e DB_USERNAME=admin -e DB_PASSWORD=Admin1234! 442940292574.dkr.ecr.eu-west-1.amazonaws.com/cloud-final-project:user-service",
              "docker run -d --name product-service --network microservices-network -p 8082:8082 -e SPRING_PROFILES_ACTIVE=docker -e DB_HOST=cloud-final-project-db.ctci8kww4g6j.eu-west-1.rds.amazonaws.com -e DB_USERNAME=admin -e DB_PASSWORD=Admin1234! 442940292574.dkr.ecr.eu-west-1.amazonaws.com/cloud-final-project:product-service",
              "docker run -d --name order-service --network microservices-network -p 8083:8083 -e SPRING_PROFILES_ACTIVE=docker -e DB_HOST=cloud-final-project-db.ctci8kww4g6j.eu-west-1.rds.amazonaws.com -e DB_USERNAME=admin -e DB_PASSWORD=Admin1234! 442940292574.dkr.ecr.eu-west-1.amazonaws.com/cloud-final-project:order-service",
              "docker run -d --name api-gateway --network microservices-network -p 8080:8080 -e SPRING_PROFILES_ACTIVE=docker -e USER_SERVICE_HOST=user-service -e PRODUCT_SERVICE_HOST=product-service -e ORDER_SERVICE_HOST=order-service 442940292574.dkr.ecr.eu-west-1.amazonaws.com/cloud-final-project:api-gateway"
            ]' \
            --region eu-west-1